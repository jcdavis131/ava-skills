name: OpenWiki Update
on:
  schedule:
    - cron: '0 2 * * 1' # Mondays 2am UTC
  workflow_dispatch:
jobs:
  openwiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g openwiki
      - name: Update code docs
        env:
          OPENWIKI_PROVIDER: ${{ secrets.OPENWIKI_PROVIDER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: openwiki code --update --print
      - name: Run open harness mock to gate
        run: |
          pip install -e .
          python -m harness run --eval all --mode mock --out-dir reports
      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore(openwiki): update docs + harness reports"
          body: "Auto-generated by openwiki code --update --print + harness mock. Personal mode builds local personal brain wiki in ~/.openwiki/wiki from configured sources like local repositories, Gmail, Notion, Web Search, Hacker News, and X/Twitter. Code mode builds repository documentation in openwiki/ for the current codebase."
          branch: openwiki/update-${{ github.run_id }}
          add-paths: |
            openwiki/
            AGENTS.md
            CLAUDE.md
            reports/
